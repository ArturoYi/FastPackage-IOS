name: Release

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:

permissions:
  contents: write

env:
  XCODE_VERSION: '16.4'
  XCODE_DESTINATION: 'platform=iOS Simulator,name=iPhone 16,OS=18.5'

jobs:
  test:
    name: Test (SPM)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: Verify Xcode
        run: xcodebuild -version

      - name: List available schemes
        run: xcodebuild -list

      - name: Run Swift Package tests
        run: |
          xcodebuild test \
            -scheme FastPackage-IOS \
            -destination '${{ env.XCODE_DESTINATION }}' \
            -skipPackagePluginValidation \
            -skipMacroValidation

  lint-podspec:
    name: Lint Podspec
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install CocoaPods
        run: gem install cocoapods --no-document

      - name: pod spec lint (remote)
        run: |
          pod spec lint FastPackage.podspec \
            --allow-warnings \
            --skip-import-validation

  publish-cocoapods:
    name: Publish to CocoaPods Trunk
    needs: [test, lint-podspec]
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install CocoaPods
        run: gem install cocoapods --no-document

      - name: Push to Trunk
        env:
          COCOAPODS_TRUNK_TOKEN: ${{ secrets.COCOAPODS_TRUNK_TOKEN }}
        run: |
          pod trunk push FastPackage.podspec \
            --allow-warnings \
            --skip-import-validation

  github-release:
    name: Create GitHub Release
    needs: [test, lint-podspec]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: |
            版本 **${{ github.ref_name }}** 已发布。

            - Swift Package Manager：使用 Git tag `${{ github.ref_name }}` 即可集成
            - CocoaPods：待 Trunk 索引完成后可用 `pod 'FastPackage', '~> ${{ github.ref_name }}'`

            完整变更记录见 [CHANGELOG.md](https://github.com/ArturoYi/FastPackage-IOS/blob/main/CHANGELOG.md)。
          draft: false
          prerelease: false
