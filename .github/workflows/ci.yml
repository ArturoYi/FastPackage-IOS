name: CI

on:
  pull_request:
  push:
    branches: [main]

env:
  XCODE_VERSION: '16.4'
  XCODE_DESTINATION: 'platform=iOS Simulator,name=iPhone 16,OS=18.5'

jobs:
  test:
    name: Test (SPM)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: Verify Xcode
        run: xcodebuild -version

      - name: Run Swift Package tests
        run: |
          xcodebuild test \
            -scheme FastPackage-IOS \
            -destination '${{ env.XCODE_DESTINATION }}' \
            -skipPackagePluginValidation
